[theme]
primaryColor = "#3B82F6"
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1E293B"
font = "sans-serif"

# For dark mode, swap to:
# backgroundColor = "#0F172A"
# secondaryBackgroundColor = "#1E293B"
# textColor = "#F1F5F9"

[server]
maxUploadSize = 10
enableXsrfProtection = true
enableCORS = false

[browser]
gatherUsageStats = false
